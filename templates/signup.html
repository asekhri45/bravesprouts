{% extends "base.html" %}
{% block body_class %}register-page{% endblock %}
{% block content %}

<div class="contain">
    <div class="login-card">

        <div class="form-container">
            <h1>Welcome&nbsp;&nbsp;👋</h1>

            <form method="POST">

                <div class="input-box">
                    <input type="email" name="email" required>
                    <span>Email</span>
                    <i></i>
                    <img src="{{ url_for('static', filename='images/emailiconblue.svg') }}" class="input-icon">
                </div>

                <div class="input-box">
                    <input type="password" name="password" id="password" required>
                    <span>Password</span>
                    <i></i>
                    <img src="{{ url_for('static', filename='images/lockiconblue.svg') }}" class="input-icon">
                </div>

                <div class="input-box">
                    <input type="password" name="confirm_password" id="confirm_password" required>
                    <span>Confirm Password</span>
                    <i></i>
                    <img src="{{ url_for('static', filename='images/lockiconblue.svg') }}" class="input-icon">
                </div>

                <input type="submit" value="Let's Practice ⌯⌲" class="submit_button">

            </form>

            <p class="login-text">
                Already have an account? <a href="{{ url_for('login') }}">Login</a>
            </p>
        </div>

    </div>
</div>

<script src="{{ url_for('static', filename='js/register.js') }}"></script>

{% endblock %}
