<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BraveSprouts Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/loging.css') }}">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <img src="{{ url_for('static', filename='images/logo_v2.png') }}" class="logo">

      <a href="/" class="back-home">← Back to Home</a>
    </header>

    <main class="login-layout">
      <section class="login-card">
        <h1>Welcome back!</h1>
        <p class="subtitle">Continue your child’s journey with BraveSprouts</p>

        <form class="login-form">
          <div class="input-group">
            <img src="{{ url_for('static', filename='images/emailiconblue.svg') }}" class="input-icon">
            <input type="email" placeholder="Email address" />
          </div>

          <div class="input-group">
            <img src="{{ url_for('static', filename='images/lockiconblue.svg') }}" class="input-icon">
            <input type="password" id="password" placeholder="Password">

            <img src="{{ url_for('static', filename='images/eye-closed.png') }}" class="password-toggle" id="togglePassword"></div>
          <div class="form-row">
            <label class="remember-me">
              <input type="checkbox" checked />
              <span>Remember me</span>
            </label>

            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

        <div class="login-buttons">
            <button type="submit" class="login-btn">LOG IN ⌯⌲</button>
        </div>
        </form>

        <div class="signup-row">
          <span>Don’t have an account?</span>
          <a href="/signup">Get started →</a>
        </div>
      </section>

      <section class="illustration-area">
        <div class="bg-circle big"></div>
        <div class="bg-circle small"></div>
        <div class="bg-blob"></div>
        <div class="sparkle sparkle-1">✦</div>
        <div class="sparkle sparkle-2">✦</div>

          <img src="{{ url_for('static', filename='images/star.png') }}" class="image-placeholder"></div>

      </section>
    </main>
  </div>
</body>
</html>
